<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="opensheetmusicdisplay.min.js"></script>
</head>
<body style="margin:0;background:#FFFCF7;">
<div id="osmd-container"></div>
<script>
var osmd=null;
function initOsmd(){
  osmd=new opensheetmusicdisplay.OpenSheetMusicDisplay("osmd-container",{autoResize:true,backend:"svg",drawTitle:true});
  Flutter.postMessage("osmdReady");
}
function loadXml(x){osmd.load(x).then(function(){osmd.render();});}
function highlightNote(i){try{osmd.cursor.show();for(var j=0;j<i;j++)osmd.cursor.next();}catch(e){}}
function getNoteIndexAtPixel(x){return -1;}
function nextPage(){osmd.nextPage();osmd.render();}
function prevPage(){osmd.previousPage();osmd.render();}
</script>
</body>
</html>
