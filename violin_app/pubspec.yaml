name: violin_app
description: Violin Practice Companion — plugin-based music performance tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  path: ^1.9.0
  ffi: ^1.2.1
  flutter_inappwebview: ^6.1.5
  file_picker: ^4.6.1
  xml: ^6.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/osmd/
    - assets/sheet_music/
